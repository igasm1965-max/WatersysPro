version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    restart: unless-stopped
    ports:
      - '1883:1883'
      - '9001:9001'
    volumes:
      - ./mosquitto/config:/mosquitto/config:rw
      - ./mosquitto/data:/mosquitto/data:rw
      - ./mosquitto/log:/mosquitto/log:rw

  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: watersys
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: on-failure
    depends_on:
      - mosquitto
      - postgres
    environment:
      PORT: 3000
      MQTT_BROKER: ${MQTT_BROKER:?Set MQTT_BROKER in .env}
      MQTT_TOPIC_BASE: watersystem
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      DEMO_FALLBACK_ENABLED: "false"
      REMOTE_REQUIRE_TOKEN: "true"
      REMOTE_ADMIN_TOKEN: ${REMOTE_ADMIN_TOKEN:?Set REMOTE_ADMIN_TOKEN in .env}
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-postgres}
      PGPASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      PGDATABASE: watersys
      PGPORT: 5432
    ports:
      - '3000:3000'

volumes:
  pgdata: