; проэкта; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
; upload_port = COM5 ; Local dev override only. Do not keep fixed port in production config.
lib_deps = 
	marcoschwartz/LiquidCrystal_I2C@^1.1.4
	adafruit/RTClib@^2.0.0
	knolleary/PubSubClient@^2.8
	teckel12/NewPing@^1.9.7
	bblanchon/ArduinoJson@^6.18.5
	me-no-dev/ESPAsyncWebServer@^3.6.0

# LittleFS enabled for web UI (768KB); logs remain on SD card
board_build.filesystem = littlefs
# OTA-совместимая partition table: 2 x 1.5MB app + 768KB LittleFS + NVS
board_build.partitions = partitions_ota.csv
build_flags = 
	-DUSE_SPIFFS=0
	-Oz
	-ffunction-sections
	-fdata-sections
	-fno-exceptions
	-fno-rtti
	-fno-unwind-tables
	-fno-asynchronous-unwind-tables
	-Wno-deprecated-declarations
	-Wl,--gc-sections
	-Wl,--strip-all
	-DDISABLE_DEBUG_SERIAL=1
